services:
  - type: web
    name: declare-assistant
    env: docker
    plan: starter
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: declare-assistant-db
          property: connectionString
      - key: LLM_API_BASE
        value: https://api.psydo.top/v1
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gpt-5.6-sol
      - key: MAX_CONTENT_LENGTH
        value: "52428800"
      - key: MAX_FORM_MEMORY_SIZE
        value: "52428800"

databases:
  - name: declare-assistant-db
    plan: starter
