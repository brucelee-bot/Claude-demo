{% extends "base.html" %} {% block title %}登录 — 申报助手{% endblock
%} {% block content %}
<div class="auth-container">
  <div class="card">
    <div class="brand">📋</div>
    <h2 style="margin-bottom: 4px">申报助手</h2>
    <p class="subtitle">专精特新 & 国家高新技术企业申报辅助系统</p>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label for="username">用户名</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="请输入用户名"
          required
          autofocus
        />
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="请输入密码"
          required
        />
      </div>

      <div class="form-group" style="display: flex; align-items: center; gap: 8px">
        <input
          type="checkbox"
          id="remember"
          name="remember"
          style="width: auto"
        />
        <label for="remember" style="margin: 0; font-size: 13px"
          >记住我</label
        >
      </div>

      <button type="submit" class="btn btn-primary btn-lg">登 录</button>
    </form>

    <div class="auth-footer">
      还没有账号？
      <a href="{{ url_for('auth.register') }}">立即注册</a>
    </div>
  </div>
</div>
{% endblock %}
