<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>{{ title }} {{ subtitle }}</title>
  <style>
    @page { size: A4; margin: 28mm 16mm 18mm; }
    {% include "_gaoxin_pdf_styles.html" %}
    {% include "_generated_document_header_styles.html" %}
    .system-document { font-size: 10.5pt; line-height: 1.75; }
    .system-document h1 { text-align: center; margin: 0 0 5pt; }
    .system-document .subtitle { text-align: center; color: #555; font-size: 9pt; margin-bottom: 12pt; }
    .system-document .signature {
      margin-top: 15pt;
      text-align: right;
      white-space: nowrap;
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .system-document .signature div + div { margin-top: 2pt; }
  </style>
</head>
<body class="system-document">
  <h1>{{ title }}</h1>
  <div class="subtitle">{{ subtitle }}</div>
  <div class="content">{{ content_text }}</div>
  {% if signature_unit or signature_date %}
  <div class="signature">
    {% if signature_unit %}<div>{{ signature_unit }}</div>{% endif %}
    {% if signature_date %}<div>{{ signature_date }}</div>{% endif %}
  </div>
  {% endif %}
</body>
</html>
