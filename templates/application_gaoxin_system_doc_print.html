<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>{{ title }} {{ subtitle }}</title>
  <style>
    @page { size: A4; margin: 28mm 16mm 18mm; }
    body { margin: 0; font-family: "Songti SC", SimSun, serif; color: #111827; font-size: 14px; line-height: 1.8; }
    {% include "_generated_document_header_styles.html" %}
    h1 { text-align: center; font-size: 22px; margin: 0 0 10px; }
    .subtitle { text-align: center; color: #4b5563; margin-bottom: 20px; }
    .content { white-space: pre-wrap; }
    .signature {
      margin-top: 22px;
      text-align: right;
      white-space: nowrap;
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .signature div + div { margin-top: 2px; }
  </style>
</head>
<body>
  <h1>{{ title }}</h1>
  <div class="subtitle">{{ subtitle }}</div>
  <div class="content">{{ content_text }}</div>
  {% if signature_unit or signature_date %}
  <div class="signature">
    {% if signature_unit %}<div>{{ signature_unit }}</div>{% endif %}
    {% if signature_date %}<div>{{ signature_date }}</div>{% endif %}
  </div>
  {% endif %}
</body>
</html>
