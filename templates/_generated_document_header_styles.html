.document-header {
  margin: 0 0 8mm;
  padding: 0 0 1.5mm;
  border-bottom: 0.5px solid #9ca3af;
  color: #4b5563;
  font-family: "Microsoft YaHei", sans-serif;
  font-size: 8px;
  line-height: 1.2;
  text-align: center;
}
.document-header span {
  display: block;
  white-space: normal;
  overflow-wrap: anywhere;
}
